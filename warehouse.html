<meta charset="UTF-8">

<title>Train Studio — Αποθήκη</title>

<style>
:root{
  --bg:#f8fafc;--bg2:#f1f5f9;--bg3:#e2e8f0;
  --text:#1e293b;--text2:#475569;--text3:#94a3b8;
  --accent:#2563eb;--accent-light:#eff6ff;
  --border:#e2e8f0;--border2:#cbd5e1;
  --radius:12px;
  --topbar-h:52px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* TOPBAR */
.topbar{height:var(--topbar-h);background:#fff;border-bottom:1.5px solid var(--border);display:flex;align-items:center;padding:0 20px;gap:12px;position:sticky;top:0;z-index:100}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo img{width:34px;height:34px}
.logo span{font-size:15px;font-weight:700;color:var(--text)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.btn-back{font-size:12px;padding:6px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);font-weight:500;text-decoration:none}
.btn-back:hover{background:var(--bg3)}

/* LAYOUT */
.layout{max-width:1200px;margin:0 auto;padding:24px 20px}

/* CATEGORY TABS */
.cat-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.cat-tab{padding:7px 14px;border-radius:20px;border:1.5px solid var(--border);background:#fff;font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;color:var(--text2);transition:all .15s}
.cat-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.cat-tab:hover:not(.active){border-color:var(--accent);color:var(--accent)}

/* SECTION */
.section{display:none}
.section.active{display:block}
.section-title{font-size:14px;font-weight:700;color:var(--text);font-family:'DM Mono',monospace;text-transform:uppercase;letter-spacing:.08em;margin-bottom:16px;display:flex;align-items:center;gap:8px}

/* EQUIPMENT GRID */
.eq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-bottom:24px}
.eq-card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;display:flex;align-items:center;gap:12px;transition:border-color .15s}
.eq-card:hover{border-color:var(--border2)}
.eq-info{flex:1;min-width:0}
.eq-name{font-size:13px;font-weight:600;color:var(--text);white-space:normal;word-break:break-word;line-height:1.3}
.eq-sub{font-size:11px;color:var(--text3);margin-top:2px}
.eq-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{width:28px;height:28px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;transition:all .15s;line-height:1}
.qty-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.qty-num{font-size:15px;font-weight:700;color:var(--text);min-width:28px;text-align:center;font-family:'DM Mono',monospace}
.qty-num.zero{color:var(--text3)}
.eq-status{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.eq-status.ok{background:#22c55e}
.eq-status.zero{background:#e2e8f0}
.eq-status.low{background:#f59e0b}

/* ADD ITEM */
.add-item-row{display:flex;gap:8px;margin-bottom:24px;flex-wrap:wrap}
.add-item-row input{flex:1;min-width:180px;padding:8px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;color:var(--text)}
.add-item-row input:focus{border-color:var(--accent)}
.btn-add{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer}
.btn-add:hover{background:#1d4ed8}

/* SUBSECTION */
.subsection{margin-bottom:20px}
.subsection-title{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:'DM Mono',monospace;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* SAVE STATUS */
.save-status{position:fixed;bottom:20px;right:20px;background:#1e293b;color:#fff;padding:10px 16px;border-radius:10px;font-size:12px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none}
.save-status.show{opacity:1}
/* Drag & Drop */
.eq-card{cursor:grab}
.eq-card.dragging{opacity:.4;cursor:grabbing}
.eq-card.drag-over{border-color:#2563eb;background:#eff6ff}
/* Qty input */
.qty-input{width:48px;height:28px;border:1.5px solid #e2e8f0;border-radius:6px;text-align:center;font-size:14px;font-weight:700;font-family:'DM Mono',monospace;color:#1e293b;outline:none;padding:0}
.qty-input:focus{border-color:#2563eb}
/* New subsection */
.add-sub-row{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.add-sub-row input{flex:1;padding:6px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.add-sub-row input:focus{border-color:#2563eb}
.btn-add-sub{padding:6px 12px;background:#f1f5f9;border:1px solid #e2e8f0;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;color:#475569;font-weight:500;white-space:nowrap}
.btn-add-sub:hover{background:#e2e8f0}
.subsection-title{display:flex;align-items:center;gap:6px}
.drag-handle{cursor:grab;color:#cbd5e1;font-size:14px;flex-shrink:0;user-select:none}
.drag-handle:hover{color:#94a3b8}
.edit-btn{width:28px;height:28px;border-radius:7px;border:1px solid #e2e8f0;background:#f8fafc;color:#94a3b8;font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;padding:0}
.edit-btn:hover{border-color:#2563eb;color:#2563eb;background:#eff6ff}
/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:#fff;border-radius:14px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-hdr{padding:16px 20px;border-bottom:1px solid #e2e8f0;display:flex;align-items:center;justify-content:space-between}
.modal-title{font-size:14px;font-weight:700;color:#1e293b}
.modal-close{background:none;border:none;font-size:18px;cursor:pointer;color:#64748b}
.modal-body{padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.modal-label{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.modal-input{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;color:#1e293b}
.modal-input:focus{border-color:#2563eb}
.modal-select{width:100%;padding:9px 12px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;color:#1e293b;background:#fff;cursor:pointer}
.modal-footer{padding:14px 20px;border-top:1px solid #e2e8f0;display:flex;gap:8px}
.btn-save{flex:1;padding:9px;background:#2563eb;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-delete{padding:9px 14px;background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600}
.btn-cancel{padding:9px 14px;background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}

/* MOBILE */
@media(max-width:600px){
  .layout{padding:16px 12px}
  .eq-grid{grid-template-columns:1fr}
  .topbar{padding:0 12px}
}
</style>
</head>

let itemOverrides = {}; // id -> {name, cat_id, sub_name} (overrides from Supabase)
let activeCat = CATALOG[0].id;

// Load from Supabase
async function loadInventory(){
  try{
    const r = await fetch(`${SUPABASE_URL}/rest/v1/inventory?select=*`, {
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    const data = await r.json();
    if(Array.isArray(data)){
      data.forEach(row => { inventory[row.id] = row.qty; });
    }
  }catch(e){ console.log('Load error:', e); }

  // Φόρτωση ονομάτων/κατηγοριών
  try{
    const r2 = await fetch(`${SUPABASE_URL}/rest/v1/inventory_items?select=*`, {
      headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`}
    });
    const data2 = await r2.json();
    if(Array.isArray(data2)){
      data2.forEach(row => {
        itemOverrides[row.id] = {name:row.name, cat_id:row.cat_id, sub_name:row.sub_name};
        // Βρες αν υπάρχει ήδη στο CATALOG
        let foundItem = null;
        let foundCat = null;
        let foundSub = null;
        CATALOG.forEach(cat => {
          cat.items.forEach(sub => {
            const item = sub.items.find(i => i.id === row.id);
            if(item){ foundItem=item; foundCat=cat; foundSub=sub; }
          });
        });
        if(foundItem){
          // Υπάρχει — ενημέρωσε όνομα ή μετακίνησε κατηγορία
          foundItem.name = row.name;
          if(row.cat_id && row.sub_name && (foundCat.id !== row.cat_id || foundSub.sub !== row.sub_name)){
            const idx = foundSub.items.indexOf(foundItem);
            if(idx !== -1) foundSub.items.splice(idx,1);
            const newCat = CATALOG.find(c => c.id === row.cat_id);
            const newSub = newCat ? newCat.items.find(s => s.sub === row.sub_name) : null;
            if(newSub && !newSub.items.find(i => i.id === row.id)) newSub.items.push(foundItem);
          }
        } else {
          // ΝΕΟ item — δεν υπάρχει στο CATALOG, πρόσθεσέ το
          if(row.cat_id){
            let targetCat = CATALOG.find(c => c.id === row.cat_id);
            // Αν δεν υπάρχει η κατηγορία, δημιούργησέ την αυτόματα
            if(!targetCat){
              targetCat = {id: row.cat_id, label: row.cat_id, emoji: '📦', items: []};
              CATALOG.push(targetCat);
            }
            const subName = row.sub_name || row.cat_id;
            let targetSub = targetCat.items.find(s => s.sub === subName);
            // Αν δεν υπάρχει η υποκατηγορία, δημιούργησέ την
            if(!targetSub){
              targetSub = {sub: subName, items: []};
              targetCat.items.push(targetSub);
            }
            if(!targetSub.items.find(i => i.id === row.id)){
              targetSub.items.push({id:row.id, name:row.name, qty:0});
            }
          }
        }
      });
    }
  }catch(e){ console.log('Load items error:', e); }

  render();
}

async function saveItem(id, qty){
  try{
    await fetch(`${SUPABASE_URL}/rest/v1/inventory`, {
      method:'POST',
      headers:{
        'apikey':SUPABASE_KEY,
        'Authorization':`Bearer ${SUPABASE_KEY}`,
        'Content-Type':'application/json',
        'Prefer':'resolution=merge-duplicates,return=minimal'
      },
      body: JSON.stringify({id, qty})
    });
    showSaved();
  }catch(e){ console.log('Save error:', e); }
}

function showSaved(){
  const s = document.getElementById('saveStatus');
  s.classList.add('show');
  setTimeout(()=>s.classList.remove('show'), 2000);
}

function getQty(id, defaultQty){
  return inventory[id] !== undefined ? inventory[id] : defaultQty;
}

let dragSrc=null;

function render(){
  // Tabs
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = '';
  CATALOG.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'cat-tab' + (cat.id === activeCat ? ' active' : '');
    btn.textContent = cat.label;
    btn.onclick = () => { activeCat = cat.id; render(); };
    tabs.appendChild(btn);
  });

  // Sections
  const sections = document.getElementById('sections');
  sections.innerHTML = '';
  CATALOG.forEach(cat => {
    const sec = document.createElement('div');
    sec.className = 'section' + (cat.id === activeCat ? ' active' : '');

    cat.items.forEach(sub => {
      const subDiv = document.createElement('div');
      subDiv.className = 'subsection';

      // Subsection title
      const subTitleWrap = document.createElement('div');
      subTitleWrap.className = 'subsection-title';
      const subTitle = document.createElement('span');
      subTitle.textContent = sub.sub;
      subTitle.style.cssText='flex:1;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;font-family:"DM Mono",monospace';
      subTitleWrap.appendChild(subTitle);
      subDiv.appendChild(subTitleWrap);

      const grid = document.createElement('div');
      grid.className = 'eq-grid';

      sub.items.forEach(item => {
        const qty = getQty(item.id, item.qty);
        const card = document.createElement('div');
        card.className = 'eq-card';
        card.draggable = true;
        card.dataset.id = item.id;
        card.dataset.subId = sub.sub;
        card.dataset.catId = cat.id;

        // Drag handle
        const handle = document.createElement('span');
        handle.className = 'drag-handle';
        handle.textContent = '⠿';
        handle.title = 'Σύρε για αλλαγή σειράς';

        // Drag events
        card.addEventListener('dragstart', e => {
          dragSrc = {item, sub, cat};
          card.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        card.addEventListener('dragend', () => card.classList.remove('dragging'));
        card.addEventListener('dragover', e => { e.preventDefault(); card.classList.add('drag-over'); });
        card.addEventListener('dragleave', () => card.classList.remove('drag-over'));
        card.addEventListener('drop', e => {
          e.preventDefault();
          card.classList.remove('drag-over');
          if(!dragSrc || dragSrc.item.id === item.id) return;
          // Αλλαγή σειράς μόνο αν είναι στο ίδιο sub
          if(dragSrc.sub === sub && dragSrc.cat === cat){
            const srcIdx = sub.items.indexOf(dragSrc.item);
            const tgtIdx = sub.items.indexOf(item);
            if(srcIdx !== -1 && tgtIdx !== -1){
              sub.items.splice(srcIdx, 1);
              sub.items.splice(tgtIdx, 0, dragSrc.item);
              render();
            }
          }
          dragSrc = null;
        });

        const status = document.createElement('div');
        status.className = 'eq-status ' + (qty === 0 ? 'zero' : qty <= 2 ? 'low' : 'ok');

        const info = document.createElement('div');
        info.className = 'eq-info';
        const name = document.createElement('div');
        name.className = 'eq-name';
        name.textContent = item.name;
        info.appendChild(name);

        const qtyDiv = document.createElement('div');
        qtyDiv.className = 'eq-qty';

        const btnMinus = document.createElement('button');
        btnMinus.className = 'qty-btn';
        btnMinus.textContent = '−';
        btnMinus.onclick = () => {
          const cur = getQty(item.id, item.qty);
          const newQty = Math.max(0, cur - 1);
          inventory[item.id] = newQty;
          saveItem(item.id, newQty);
          render();
        };

        // Qty input — απευθείας εισαγωγή αριθμού
        const qtyInp = document.createElement('input');
        qtyInp.className = 'qty-input';
        qtyInp.type = 'number';
        qtyInp.min = '0';
        qtyInp.value = qty;
        qtyInp.addEventListener('change', () => {
          const newQty = Math.max(0, parseInt(qtyInp.value)||0);
          inventory[item.id] = newQty;
          saveItem(item.id, newQty);
          qtyInp.value = newQty;
          // Ενημέρωση status
          status.className = 'eq-status ' + (newQty === 0 ? 'zero' : newQty <= 2 ? 'low' : 'ok');
        });
        qtyInp.addEventListener('blur', () => {
          const newQty = Math.max(0, parseInt(qtyInp.value)||0);
          inventory[item.id] = newQty;
          saveItem(item.id, newQty);
        });

        const btnPlus = document.createElement('button');
        btnPlus.className = 'qty-btn';
        btnPlus.textContent = '+';
        btnPlus.onclick = () => {
          const cur = getQty(item.id, item.qty);
          const newQty = cur + 1;
          inventory[item.id] = newQty;
          qtyInp.value = newQty;
          saveItem(item.id, newQty);
          status.className = 'eq-status ' + (newQty === 0 ? 'zero' : newQty <= 2 ? 'low' : 'ok');
        };

        btnMinus.onclick = () => {
          const cur = getQty(item.id, item.qty);
          const newQty = Math.max(0, cur - 1);
          inventory[item.id] = newQty;
          qtyInp.value = newQty;
          saveItem(item.id, newQty);
          status.className = 'eq-status ' + (newQty === 0 ? 'zero' : newQty <= 2 ? 'low' : 'ok');
        };

        qtyDiv.appendChild(btnMinus);
        qtyDiv.appendChild(qtyInp);
        qtyDiv.appendChild(btnPlus);

        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.textContent = '✏️';
        editBtn.title = 'Επεξεργασία';
        editBtn.onclick = (e) => { e.stopPropagation(); openEditModal(item, cat, sub); };

        card.appendChild(handle);
        card.appendChild(status);
        card.appendChild(info);
        card.appendChild(qtyDiv);
        card.appendChild(editBtn);
        grid.appendChild(card);
      });

      subDiv.appendChild(grid);
      sec.appendChild(subDiv);
    });

    // Νέα υποκατηγορία
    const addSubRow = document.createElement('div');
    addSubRow.className = 'add-sub-row';
    const subInp = document.createElement('input');
    subInp.placeholder = '+ Νέα υποκατηγορία (π.χ. Μικρόφωνα)...';
    const addSubBtn = document.createElement('button');
    addSubBtn.className = 'btn-add-sub';
    addSubBtn.textContent = '+ Κατηγορία';
    addSubBtn.onclick = () => {
      const name = subInp.value.trim();
      if(!name) return;
      cat.items.push({sub:name, items:[]});
      subInp.value = '';
      render();
    };
    addSubRow.appendChild(subInp);
    addSubRow.appendChild(addSubBtn);
    sec.appendChild(addSubRow);

    // Νέο αντικείμενο
    const addRow = document.createElement('div');
    addRow.className = 'add-item-row';
    const inp = document.createElement('input');
    inp.placeholder = '+ Νέο αντικείμενο...';
    inp.type = 'text';

    // Επιλογή υποκατηγορίας
    const subSel = document.createElement('select');
    subSel.style.cssText='padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:8px;font-size:12px;font-family:"DM Sans",sans-serif;color:#475569;background:#fff;cursor:pointer;outline:none';
    cat.items.forEach(s => {
      const opt = document.createElement('option');
      opt.value = s.sub;
      opt.textContent = s.sub;
      subSel.appendChild(opt);
    });

    const addBtn = document.createElement('button');
    addBtn.className = 'btn-add';
    addBtn.textContent = 'Προσθήκη';
    addBtn.onclick = async () => {
      const name = inp.value.trim();
      if(!name) return;
      const id = cat.id + '_' + name.toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + Date.now().toString(36);
      const targetSub = cat.items.find(s => s.sub === subSel.value) || cat.items[cat.items.length-1];
      targetSub.items.push({id, name, qty:0});
      inventory[id] = 0;
      // Αποθήκευση ποσότητας
      await saveItem(id, 0);
      // Αποθήκευση ονόματος/κατηγορίας στο inventory_items
      try{
        await fetch(`${SUPABASE_URL}/rest/v1/inventory_items`, {
          method:'POST',
          headers:{
            'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,
            'Content-Type':'application/json',
            'Prefer':'resolution=merge-duplicates,return=minimal'
          },
          body: JSON.stringify({id, name, cat_id:cat.id, sub_name:targetSub.sub})
        });
      }catch(e){ console.log('Save item error:', e); }
      inp.value = '';
      render();
    };
    addRow.appendChild(inp);
    addRow.appendChild(subSel);
    addRow.appendChild(addBtn);
    sec.appendChild(addRow);

    sections.appendChild(sec);
  });
}

function openEditModal(item, cat, sub){
  // Φτιάξε overlay
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';

  const box = document.createElement('div');
  box.className = 'modal-box';

  // Header
  const hdr = document.createElement('div');
  hdr.className = 'modal-hdr';
  const title = document.createElement('div');
  title.className = 'modal-title';
  title.textContent = '✏️ Επεξεργασία';
  const closeBtn = document.createElement('button');
  closeBtn.className = 'modal-close';
  closeBtn.textContent = '✕';
  closeBtn.onclick = () => document.body.removeChild(overlay);
  hdr.appendChild(title); hdr.appendChild(closeBtn);
  box.appendChild(hdr);

  // Body
  const body = document.createElement('div');
  body.className = 'modal-body';

  // Όνομα
  const nameLbl = document.createElement('div');
  nameLbl.className = 'modal-label';
  nameLbl.textContent = 'Όνομα';
  const nameInp = document.createElement('input');
  nameInp.className = 'modal-input';
  nameInp.value = item.name;
  body.appendChild(nameLbl);
  body.appendChild(nameInp);

  // Κατηγορία
  const catLbl = document.createElement('div');
  catLbl.className = 'modal-label';
  catLbl.textContent = 'Κατηγορία';
  const catSel = document.createElement('select');
  catSel.className = 'modal-select';
  CATALOG.forEach(c => {
    c.items.forEach(s => {
      const opt = document.createElement('option');
      opt.value = c.id + '|||' + s.sub;
      opt.textContent = c.label + ' → ' + s.sub;
      opt.selected = (c.id === cat.id && s.sub === sub.sub);
      catSel.appendChild(opt);
    });
  });
  body.appendChild(catLbl);
  body.appendChild(catSel);

  box.appendChild(body);

  // Footer
  const footer = document.createElement('div');
  footer.className = 'modal-footer';

  const saveBtn = document.createElement('button');
  saveBtn.className = 'btn-save';
  saveBtn.textContent = '💾 Αποθήκευση';
  saveBtn.onclick = async () => {
    const newName = nameInp.value.trim();
    if(!newName) return;
    const [newCatId, newSubName] = catSel.value.split('|||');

    // Αφαίρεση από παλιά θέση
    const oldIdx = sub.items.indexOf(item);
    if(oldIdx !== -1) sub.items.splice(oldIdx, 1);

    // Αλλαγή ονόματος
    item.name = newName;

    // Προσθήκη στη νέα κατηγορία
    const newCat = CATALOG.find(c => c.id === newCatId);
    const newSub = newCat ? newCat.items.find(s => s.sub === newSubName) : null;
    if(newSub && !newSub.items.find(i => i.id === item.id)) newSub.items.push(item);

    // Αποθήκευση στη Supabase
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/inventory_items`, {
        method:'POST',
        headers:{
          'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,
          'Content-Type':'application/json','Prefer':'resolution=merge-duplicates,return=minimal'
        },
        body: JSON.stringify({id:item.id, name:newName, cat_id:newCatId, sub_name:newSubName})
      });
    }catch(e){ console.log('Save item error:', e); }

    document.body.removeChild(overlay);
    activeCat = newCatId;
    render();
    showSaved();
  };

  const deleteBtn = document.createElement('button');
  deleteBtn.className = 'btn-delete';
  deleteBtn.textContent = '🗑 Διαγραφή';
  deleteBtn.onclick = async () => {
    if(!confirm('Διαγραφή "' + item.name + '";')) return;
    const idx = sub.items.indexOf(item);
    if(idx !== -1) sub.items.splice(idx, 1);
    try{
      await fetch(`${SUPABASE_URL}/rest/v1/inventory?id=eq.${encodeURIComponent(item.id)}`, {
        method:'DELETE',
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'}
      });
      await fetch(`${SUPABASE_URL}/rest/v1/inventory_items?id=eq.${encodeURIComponent(item.id)}`, {
        method:'DELETE',
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Prefer':'return=minimal'}
      });
    }catch(e){}
    delete inventory[item.id];
    delete itemOverrides[item.id];
    document.body.removeChild(overlay);
    render();
  };

  const cancelBtn = document.createElement('button');
  cancelBtn.className = 'btn-cancel';
  cancelBtn.textContent = 'Ακύρωση';
  cancelBtn.onclick = () => document.body.removeChild(overlay);

  footer.appendChild(saveBtn);
  footer.appendChild(deleteBtn);
  footer.appendChild(cancelBtn);
  box.appendChild(footer);

  overlay.appendChild(box);
  overlay.addEventListener('click', e => { if(e.target === overlay) document.body.removeChild(overlay); });
  document.body.appendChild(overlay);
}

// Φόρτωση
loadInventory();
</script>
